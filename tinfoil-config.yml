cvm-version: 0.10.1
cpus: 2
memory: 4096

networks:
  public:
    egress: open

containers:
  - name: "tinfoil-buckets"
    image: "ghcr.io/tinfoilsh/tinfoil-buckets@sha256:1b49ab141137bc9b48e756789d275a0920924e13ac934cf3bd977bfe52d868e2" # v0.0.9
    networks: [public]
    env:
      - R2_BUCKET_NAME: "tinfoil-bucket"
      - CONTROL_PLANE_URL: "https://api.tinfoil.sh"
      - USAGE_REPORTER_ID: "tinfoil-buckets"
    secrets:
      - CLOUDFLARE_ACCOUNT_ID
      - R2_TINFOIL_BUCKET_ACCESS_KEY_ID
      - R2_TINFOIL_BUCKET_SECRET_ACCESS_KEY
      - USAGE_REPORTER_SECRET

shim:
  listen-port: 443
  upstream-port: 8089
  paths:
    - /items/*
    - /mcp
    - /health
  authenticated: true
  authenticated-endpoints:
    - /items/*
