shim-version: v0.3.18@sha256:7d9f98be78c91ede89f43c948a12d084fae34312effe9395ca7ed572991cb561
cvm-version: 0.7.5
cpus: 2
memory: 4096

containers:
  - name: "tinfoil-buckets"
    image: "ghcr.io/tinfoilsh/tinfoil-buckets@sha256:48b15f42f7133db2edfd3bd60fac759ed2aafa683096022b4beb33484d74be23" # v0.0.4
    env:
      - R2_BUCKET_NAME: "tinfoil-bucket"
    secrets:
      - CLOUDFLARE_ACCOUNT_ID
      - R2_TINFOIL_BUCKET_ACCESS_KEY_ID
      - R2_TINFOIL_BUCKET_SECRET_ACCESS_KEY

shim:
  listen-port: 443
  upstream-port: 8089
  paths:
