shim-version: v0.3.18@sha256:7d9f98be78c91ede89f43c948a12d084fae34312effe9395ca7ed572991cb561
cvm-version: 0.7.1
cpus: 2
memory: 4096

containers:
  - name: "confidential-kv"
    image: "ghcr.io/tinfoilsh/confidential-kv@sha256:placeholder"
    env:
      - R2_BUCKET_NAME: "kv-store"
    secrets:
      - CLOUDFLARE_ACCOUNT_ID
      - CLOUDFLARE_API_TOKEN

shim:
  listen-port: 443
  upstream-port: 8089
  paths:
    - /kv/
    - /mcp
    - /health
