shim-version: v0.3.18@sha256:7d9f98be78c91ede89f43c948a12d084fae34312effe9395ca7ed572991cb561
cvm-version: 0.7.5
cpus: 2
memory: 4096

containers:
  - name: "tinfoil-buckets"
    image: "ghcr.io/tinfoilsh/tinfoil-buckets@sha256:b9bc29a1e34448764e045b4617ac56752b44e96e23f3d47678ab39cb1695556a" # v0.0.5
    env:
      - R2_BUCKET_NAME: "tinfoil-bucket"
      - CONTROL_PLANE_URL: "https://api.tinfoil.sh"
    secrets:
      - CLOUDFLARE_ACCOUNT_ID
      - R2_TINFOIL_BUCKET_ACCESS_KEY_ID
      - R2_TINFOIL_BUCKET_SECRET_ACCESS_KEY

shim:
  listen-port: 443
  upstream-port: 8089
  paths:
    - /items/*
    - /mcp
    - /health
